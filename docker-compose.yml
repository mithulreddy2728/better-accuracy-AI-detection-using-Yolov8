services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./nozzle_detection.db
      - SECRET_KEY=your-secret-key-change-in-production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:3000,https://doux-onie-uncitizenlike.ngrok-free.dev
    volumes:
      - backend-media:/app/media
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  ai-engine:
    build:
      context: .
      dockerfile: Dockerfile.ai
    environment:
      - AI_API_BASE_URL=http://backend:8000
      - DETECTION_INTERVAL=5
      - DUPLICATE_TIME_WINDOW=60
    depends_on:
      - backend
    volumes:
      - ./ai_engine:/app/ai_engine
      - backend-media:/app/media
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  backend-media:
