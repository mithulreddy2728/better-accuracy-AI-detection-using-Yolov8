version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./backend/nozzle_detection.db
      - SECRET_KEY=your-secret-key-change-in-production
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./backend:/app
      - ./database:/app/database
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network

  ai-engine:
    build:
      context: .
      dockerfile: Dockerfile.ai
    environment:
      - AI_API_BASE_URL=http://backend:8000
      - DETECTION_INTERVAL=5
      - DUPLICATE_TIME_WINDOW=60
    depends_on:
      - backend
    volumes:
      - ./ai_engine:/app
      - ./backend/media:/app/media
    networks:
      - app-network

  db:
    image: sqlite3:latest
    volumes:
      - ./backend/nozzle_detection.db:/data/nozzle_detection.db
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
