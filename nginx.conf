server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    # Serve React static files
    root /usr/share/nginx/html;
    index index.html;

    # React Router: try file, then directory, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to the FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Proxy /login and /register directly (no /api prefix in backend)
    location ~ ^/(login|register|camera|vehicle|geo-marker|upload|live-feed)(/.*)?$ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Proxy media files served by the backend
    location /media/ {
        proxy_pass http://backend:8000/media/;
        proxy_set_header Host $host;
    }

    # Gzip compression for static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
